name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: python -m pip install --disable-pip-version-check -r requirements-dev.txt
      - run: python -m pip check
      - run: python -m ruff check app scripts tests
      - run: >-
          python -m ruff format --check
          scripts/evaluate_vision_dataset.py
          scripts/manage_learned_gallery.py
          scripts/manage_vision_outbox.py
          scripts/prepare_vision_models.py
          scripts/provision_access_context.py
          scripts/verify_vision_models.py
          tests/test_deployment_contract.py
          tests/test_evaluate_vision_dataset.py
          tests/test_manage_learned_gallery_cli.py
          tests/test_manage_vision_outbox_cli.py
          tests/test_provision_access_context.py
          tests/test_vision_model_bundle.py
      - run: python -m pytest

  containers:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - run: cp .env.api.example .env.api
      - run: cp .env.vision.example .env.vision
      - run: docker compose --env-file .env.vision --profile vision config --quiet
      - run: docker build --tag rag-audit:ci .
      - run: docker build --file Dockerfile.vision --tag rag-audit-vision:ci .
