services:
  rag-audit:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.api
    environment:
      RAG_AUDIT_DB_PATH: /app/data/api/rag_audit.db
      RAG_AUDIT_VISION_EVIDENCE_DIR: /app/data/private/evidence
    volumes:
      - ./data/api:/app/data/api
      - ./data/private/evidence:/app/data/private/evidence
    read_only: true
    tmpfs:
      - /tmp:size=32m,noexec,nosuid,nodev
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready', timeout=2)",
        ]
      interval: 15s
      timeout: 3s
      retries: 5

  vision-worker:
    profiles: ["vision"]
    build:
      context: .
      dockerfile: Dockerfile.vision
    env_file:
      - .env.vision
    environment:
      RAG_AUDIT_API_BASE_URL: http://rag-audit:8000
      RAG_AUDIT_VISION_MODELS_DIR: /app/vision-models
      RAG_AUDIT_GALLERY_MANIFEST: /app/data/private/gallery/manifest.json
      RAG_AUDIT_GALLERY_CACHE_PATH: /app/data/private/cache/{camera_id}/embeddings.arcface.npz
      RAG_AUDIT_CAMERA_CALIBRATION: /app/data/private/config/camera-calibration.json
      RAG_AUDIT_VISION_OUTBOX_PATH: /app/data/private/outbox/{camera_id}.db
      RAG_AUDIT_VISION_DRY_RUN_OUTBOX_PATH: /app/data/private/outbox/{camera_id}.dry-run.db
      RAG_AUDIT_VISION_EVIDENCE_DIR: /app/data/private/evidence
      RAG_AUDIT_LEARNED_DB_PATH: /app/data/private/learned/learned.db
    volumes:
      - ./data/private/gallery:/app/data/private/gallery:ro
      - ./data/private/cache:/app/data/private/cache
      - ./data/private/config:/app/data/private/config:ro
      - ./data/private/outbox:/app/data/private/outbox
      - ./data/private/evidence:/app/data/private/evidence
      - ./data/private/learned:/app/data/private/learned
      - ${RAG_AUDIT_VISION_MODELS_HOST_DIR:-./data/vision-models}:/app/vision-models:ro
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
